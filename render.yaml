services:
  - type: web
    name: group-order-app
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /api/menu
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROUP_ORDER_DB_PATH
        value: /var/data/group_orders.db
    disk:
      name: group-order-data
      mountPath: /var/data
      sizeGB: 1
